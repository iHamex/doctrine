site_name: Doctrine Documentation
site_url: https://ihamex.github.io/doctrine/
# Documentation directory
docs_dir: docs

# Repository
repo_name: doctrine-docs

# Theme Settings
theme:
  language: en
  name: material
  logo: media/doctrine-logo.svg
  favicon: media/favicon.png
  palette:
    - scheme: slate
      primary: 'blue grey'
      accent: 'indigo'
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    # navigation.instant and navigation.prefetch, 
    # are not compatible with Search on language switch toggle
    #- navigation.instant
    #- navigation.instant.prefetch
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.select
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.mermaid


# CSS Settings
extra_css:
  - media/custom.css


# JS Settings
extra_javascript:
  - media/custom.js


# Extra Settings
extra:
  generator: false


# Extensions
markdown_extensions:
  - pymdownx.highlight:
      linenums: true 
      linenums_style: pymdownx-inline
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - sane_lists

# Plugins
plugins:
  - search

